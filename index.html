<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Thafara Store - Marketplace</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* LOGIN MODAL */
.login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

.login-box input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.login-box button{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

/* HEADER */
.header{
  background:white;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.header h1{
  margin:0;
}

/* FILTER */
.filter{
  text-align:center;
  margin:15px;
}

.filter button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#e5e7eb;
}

.filter button.active{
  background:#16a34a;
  color:white;
}

/* CART */
.cart{
  position:fixed;
  top:10px;
  right:10px;
  background:#ef4444;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  font-weight:bold;
  z-index:1000;
}

/* GRID */
.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#16a34a;
  font-weight:bold;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

.wa{background:#16a34a;color:white;}
.shopee{background:#ef4444;color:white;}
.cartbtn{background:#2563eb;color:white;}

/* MAP */
.map{
  width:100%;
  height:300px;
  border:0;
  border-radius:12px;
  margin-top:20px;
}

/* HIDE */
.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>Login Thafara Store</h3>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="document.getElementById('login').style.display='none'">
      Masuk
    </button>
  </div>
</div>

<!-- CART -->
<div class="cart">
  🛒 <span id="cart">0</span>
</div>

<!-- HEADER -->
<div class="header">
  <h1>THAFARA STORE</h1>
</div>

<!-- FILTER -->
<div class="filter">
  <button class="active" onclick="filter('all')">Semua</button>
  <button onclick="filter('perempuan')">Perempuan</button>
  <button onclick="filter('laki')">Laki-laki</button>
  <button onclick="filter('masjid')">Masjid</button>
</div>

<!-- PRODUCTS -->
<div class="container">
<div class="grid">

<!-- PRODUCT 1 -->
<div class="card item perempuan">
  <img src="produk11.jpg.jpeg">
  <div class="content">
    <h3>Paket Perempuan</h3>
    <div class="price">Rp 650.000</div>

    <div class="btn cartbtn" onclick="addCart()">+ Add to Cart</div>
    <a class="btn wa" href="https://wa.me/6285752208934">WhatsApp</a>
    <a class="btn shopee" href="https://id.shp.ee/ceqrooAD" target="_blank">Shopee</a>
  </div>
</div>

<!-- PRODUCT 2 -->
<div class="card item laki">
  <img src="produk12.jpg.jpeg">
  <div class="content">
    <h3>Paket Laki-laki</h3>
    <div class="price">Rp 630.000</div>

    <div class="btn cartbtn" onclick="addCart()">+ Add to Cart</div>
    <a class="btn wa" href="https://wa.me/6285752208934">WhatsApp</a>
    <a class="btn shopee" href="https://id.shp.ee/ceqrooAD" target="_blank">Shopee</a>
  </div>
</div>

<!-- PRODUCT 3 -->
<div class="card item masjid">
  <img src="produk13.jpg.jpeg">
  <div class="content">
    <h3>Paket Masjid</h3>
    <div class="price">Rp 750.000</div>

    <div class="btn cartbtn" onclick="addCart()">+ Add to Cart</div>
    <a class="btn wa" href="https://wa.me/6285752208934">WhatsApp</a>
    <a class="btn shopee" href="https://id.shp.ee/ceqrooAD" target="_blank">Shopee</a>
  </div>
</div>

</div>

<!-- MAP -->
<h2 style="text-align:center;margin-top:30px;">📍 Lokasi Kami</h2>

<iframe class="map"
src="https://www.google.com/maps?q=HtiU5xhVNah5xpyC7&output=embed">
</iframe>

</div>

<script>
let count = 0;

function addCart(){
  count++;
  document.getElementById('cart').innerText = count;
}

function filter(cat){
  let items = document.querySelectorAll('.item');

  items.forEach(i=>{
    if(cat=='all'){
      i.style.display='block';
    } else {
      i.classList.contains(cat) ? i.style.display='block' : i.style.display='none';
    }
  });
}
</script>

</body>
</html>
